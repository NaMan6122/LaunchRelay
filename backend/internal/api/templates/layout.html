<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{block "title" .}}LaunchRelay{{end}}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.5; color: #1a1a1a; background: #f5f5f5; }
  a { color: #0066ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .header { background: #1a1a1a; color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header a { color: #999; font-size: 13px; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 16px; text-align: center; }
  .kpi .value { font-size: 28px; font-weight: 700; color: #1a1a1a; }
  .kpi .label { font-size: 12px; color: #666; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e5e5; font-size: 13px; }
  th { font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase; }
  .empty { text-align: center; color: #999; padding: 40px 20px; }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: #666; }
  .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: #0066ff; color: #fff; }
  .btn-primary:hover { opacity: 0.85; text-decoration: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #e6f7e6; color: #00a854; }
  .badge-yellow { background: #fff7e6; color: #d48806; }
  .badge-red { background: #ffe6e6; color: #d93025; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .footer { text-align: center; padding: 24px; font-size: 12px; color: #999; }
  @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } .container { padding: 12px; } }
</style>
</head>
<body>
<div class="header">
  <h1>LaunchRelay</h1>
  <div>
    {{if .StartupName}}<span style="margin-right:12px;color:#999;font-size:13px">{{.StartupName}}</span>{{end}}
    <a href="/directory">Directory</a>
  </div>
</div>
<div class="container">
{{block "content" .}}{{end}}
</div>
<div class="footer">LaunchRelay &mdash; reciprocal traffic for indie founders</div>
</body>
</html>
