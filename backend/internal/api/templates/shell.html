<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.PageTitle}} — LaunchRelay</title>
{{.StyleTags}}
{{.ScriptTags}}
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.6; color: #1a1a1a; background: #f8fafc; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; text-decoration: none; }
  .btn-outline { background: transparent; color: #2563eb; border: 1px solid #2563eb; }
  .btn-outline:hover { background: #eff6ff; text-decoration: none; }
  .btn-large { padding: 12px 28px; font-size: 15px; border-radius: 8px; }
</style>
</head>
<body>
<div id="app" data-page="{{.Page}}" data-props='{{.PropsJSON}}'></div>
<div id="root"></div>
</body>
</html>
